<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Vishnu Sahasranama Stotram</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-light:#f5d78a;--deep:#08060f;
  --bg:#0a0812;--card:#130f1e;--border:rgba(201,168,76,0.25);
  --text:#f0e6cc;--muted:#9d8050;--accent:#d4a843;
  --vis:#7a2095;--vis2:#b060e0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;font-size:17px;line-height:1.7;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 40% at 50% 0%,rgba(122,32,149,0.12) 0%,transparent 65%),
  radial-gradient(ellipse 50% 50% at 10% 80%,rgba(201,168,76,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;background:rgba(10,8,18,0.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;}
.nav-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%;}
.nav-controls{display:flex;gap:6px;align-items:center;}
.nav-btn{background:rgba(201,168,76,0.1);border:1px solid var(--border);color:var(--gold);padding:5px 11px;border-radius:4px;font-size:13px;cursor:pointer;transition:all .2s;}
.nav-btn:hover,.nav-btn.active{background:rgba(201,168,76,0.28);border-color:var(--gold);}
.nav-home{background:rgba(201,168,76,0.1);border:1px solid var(--border);color:var(--gold);padding:5px 11px;border-radius:4px;font-size:13px;text-decoration:none;transition:all .2s;font-family:'Cinzel',serif;}
.nav-home:hover{background:rgba(201,168,76,0.25);}
.progress-bar{position:fixed;top:52px;left:0;z-index:99;height:2px;background:linear-gradient(90deg,var(--vis),var(--vis2));width:0%;box-shadow:0 0 10px var(--vis);}
.hero{position:relative;z-index:1;text-align:center;padding:44px 16px 28px;border-bottom:1px solid var(--border);}
.hero-om{font-size:56px;line-height:1;margin-bottom:8px;display:block;animation:ompulse 4s ease-in-out infinite;}
@keyframes ompulse{0%,100%{filter:drop-shadow(0 0 16px rgba(122,32,149,0.5));}50%{filter:drop-shadow(0 0 40px rgba(176,96,224,0.8));}}
.hero h1{font-family:'Cinzel',serif;font-size:clamp(18px,5vw,30px);font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:4px;}
.hero-dev{font-size:clamp(16px,4vw,24px);color:var(--gold-light);margin-bottom:8px;}
.hero-sub{font-size:13px;color:var(--muted);font-style:italic;}
.divider{display:flex;align-items:center;gap:10px;max-width:360px;margin:14px auto 0;color:var(--gold);font-size:16px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* VIEW TOGGLE */
.view-toggle{position:relative;z-index:1;display:flex;justify-content:center;padding:16px 14px 8px;}
.vt-btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:8px 24px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .2s;}
.vt-btn:first-child{border-radius:6px 0 0 6px;}
.vt-btn:last-child{border-radius:0 6px 6px 0;border-left:none;}
.vt-btn.active{background:rgba(201,168,76,0.18);border-color:var(--gold);color:var(--gold);}

/* SEARCH */
.search-bar{position:relative;z-index:1;padding:6px 14px 10px;display:none;}
.search-bar.active{display:block;}
.search-bar input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:6px;font-size:16px;font-family:'EB Garamond',serif;outline:none;}
.search-bar input:focus{border-color:var(--gold);}
.search-bar input::placeholder{color:var(--muted);}

/* TOC */
.toc{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:8px 14px 14px;}
.toc-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Cinzel',serif;transition:all .2s;}
.toc-btn:hover{border-color:var(--gold);color:var(--gold);}

/* MAIN */
main{position:relative;z-index:1;padding:0 14px 120px;max-width:960px;margin:0 auto;}
.section{margin-top:24px;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;user-select:none;}
.section-header h2{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap;}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%);opacity:.4;}
.section-toggle{color:var(--gold);font-size:16px;transition:transform .3s;}
.section-toggle.collapsed{transform:rotate(-90deg);}
.speaker{font-family:'Cinzel',serif;font-size:10px;color:var(--gold-light);letter-spacing:1.5px;text-transform:uppercase;margin:14px 0 7px;display:flex;align-items:center;gap:8px;}
.speaker::after{content:'';flex:1;height:1px;background:rgba(245,215,138,0.2);}
.note{font-style:italic;color:var(--muted);padding:7px 12px;border-left:2px solid var(--gold);margin:9px 0 12px;background:rgba(201,168,76,0.04);border-radius:0 4px 4px 0;}

/* TABLES */
.tbl-wrap{overflow-x:auto;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;}
table{width:100%;border-collapse:collapse;font-size:16px;}
table th{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;background:rgba(201,168,76,0.07);}
table td{padding:11px 14px;border-bottom:1px solid rgba(201,168,76,0.1);vertical-align:top;line-height:1.65;}
table tbody tr:last-child td{border-bottom:none;}
table tbody tr:hover td{background:rgba(201,168,76,0.04);}
td.num{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);opacity:.75;width:80px;white-space:nowrap;padding-top:14px;}
td.verse .l2{color:#c8b880;padding-left:12px;display:block;margin-top:2px;}
td.meaning{font-style:italic;color:var(--muted);font-size:15px;border-left:2px solid rgba(201,168,76,0.25);padding-left:16px;}
tr.hl td{background:rgba(201,168,76,0.1) !important;}
tr.speaker-row td{padding:0;border:none;}

/* NAMA CHIPS */
.nama-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;padding-top:9px;border-top:1px solid rgba(201,168,76,0.15);}
.nc{display:inline-flex;align-items:baseline;gap:4px;background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:4px;padding:3px 8px;font-size:13px;cursor:pointer;transition:all .15s;line-height:1.4;}
.nc:hover,.nc.active{background:rgba(201,168,76,0.22);border-color:var(--gold);color:var(--gold-light);}
.nc-n{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);opacity:.65;margin-right:2px;letter-spacing:.5px;}

/* MEANING COLUMN NAMA LIST */
.nm-list{display:flex;flex-direction:column;gap:5px;}
.nm-entry{font-size:14px;line-height:1.5;}
.nm-entry strong{color:var(--text);font-style:normal;}

/* NAMA POPUP */
.nama-popup{display:none;position:fixed;z-index:500;bottom:70px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--gold);border-radius:8px;padding:14px 18px;
  max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.nama-popup.visible{display:block;}
.np-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.np-name{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:1px;}
.np-num{font-family:'Cinzel',serif;font-size:11px;color:var(--muted);}
.np-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.np-close:hover{color:var(--gold);}
.np-meaning{font-style:italic;color:var(--text);font-size:16px;line-height:1.6;}

/* VIEW SWITCHING */
.view-shloka  .only-meaning{display:none;}
.view-meaning .only-shloka{display:none;}
.view-shloka .nama-row{display:none;}
.view-shloka td.num{display:none;}
.view-shloka tr{display:block;width:100%;}
.view-shloka td.verse{display:block;width:100%;box-sizing:border-box;}
.view-shloka thead{display:none;}

/* CHANT REPEAT BADGE */
.chant-badge{display:block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--gold);background:rgba(201,168,76,0.15);border:1px solid var(--gold);border-radius:12px;padding:3px 12px;margin-bottom:8px;width:fit-content;}

.back-top{position:fixed;bottom:80px;right:18px;z-index:200;background:linear-gradient(135deg,var(--vis),var(--vis2));color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(122,32,149,0.5);}
.back-top.visible{display:flex;}

/* AUTO-SCROLL CONTROLLER */
.scroll-bar{position:fixed;bottom:18px;left:18px;z-index:300;display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(15,10,25,0.92);border:1px solid rgba(255,255,255,0.12);border-radius:999px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.5);transition:opacity .25s;white-space:nowrap;}
.scroll-bar.hidden{display:none;}
.scroll-play-btn{background:linear-gradient(135deg,var(--vis),var(--vis2));border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.scroll-play-btn:hover{opacity:.8;}
.scroll-speed-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#e0d8f0;width:26px;height:26px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s;}
.scroll-speed-btn:hover{background:rgba(255,255,255,0.18);}
.scroll-speed-val{color:#e8d8ff;font-size:12px;font-family:'Cinzel',serif;min-width:34px;text-align:center;letter-spacing:.5px;}
.scroll-speed-slider{-webkit-appearance:none;appearance:none;width:72px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;outline:none;cursor:pointer;accent-color:linear-gradient(135deg,var(--vis),var(--vis2));}
.scroll-speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--vis),var(--vis2));cursor:pointer;}
.scroll-speed-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--vis),var(--vis2));cursor:pointer;border:none;}
.sb-divider{width:1px;height:20px;background:rgba(255,255,255,0.15);margin:0 2px;flex-shrink:0;}
.scroll-toggle-btn{background:none;border:none;color:rgba(255,255,255,0.4);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0;}
.scroll-toggle-btn:hover{color:rgba(255,255,255,0.9);}
@media(max-width:400px){.scroll-speed-slider{display:none;}.scroll-speed-val{min-width:28px;font-size:11px;}}
.scroll-bar-open-btn{position:fixed;bottom:18px;left:18px;z-index:300;display:none;align-items:center;gap:6px;padding:7px 14px 7px 10px;background:rgba(15,10,25,0.92);border:1px solid rgba(255,255,255,0.12);border-radius:999px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.5);color:#e0d8f0;font-size:12px;font-family:'Cinzel',serif;cursor:pointer;letter-spacing:.5px;white-space:nowrap;transition:opacity .2s;}
.scroll-bar-open-btn:hover{opacity:.8;}
.scroll-bar-open-btn.hidden{display:none;}
.ob-icon{width:22px;height:22px;background:linear-gradient(135deg,var(--vis),var(--vis2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;}
body.light-mode .scroll-bar,body.light-mode .scroll-bar-open-btn{background:rgba(255,248,230,0.97);border-color:rgba(0,0,0,0.12);box-shadow:0 4px 24px rgba(0,0,0,0.15);}
body.light-mode .scroll-speed-btn{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.12);color:#3a2000;}
body.light-mode .scroll-speed-btn:hover{background:rgba(0,0,0,0.12);}
body.light-mode .scroll-speed-val{color:#3a2000;}
body.light-mode .scroll-toggle-btn{color:rgba(0,0,0,0.35);}
body.light-mode .scroll-toggle-btn:hover{color:rgba(0,0,0,0.75);}
body.light-mode .scroll-bar-open-btn{color:#3a2000;}
body.light-mode .sb-divider{background:rgba(0,0,0,0.12);}
},{passive:true});
window.addEventListener('touchmove',(e)=>{
  if(touchOnBar)return;
  if(!scrollActive)return;
  const dy=Math.abs(e.touches[0].clientY-touchStartY);
  const dx=Math.abs(e.touches[0].clientX-touchStartX);
  if(dy>8&&dy>dx){stopScroll();}
},{passive:true});
</script>
<div class="scroll-bar" id="scrollBar">
  <button class="scroll-play-btn" id="scrollPlayBtn" onclick="toggleScroll()" title="Play / Pause">▶</button>
  <button class="scroll-speed-btn" onclick="adjustSpeed(-1)" title="Slower">−</button>
  <span class="scroll-speed-val" id="speedVal">1.6×</span>
  <button class="scroll-speed-btn" onclick="adjustSpeed(1)" title="Faster">+</button>
  <input type="range" class="scroll-speed-slider" id="speedSlider" min="1" max="30" value="7" step="1" oninput="updateSpeed(this.value)">
  <div class="sb-divider"></div>
  <button class="scroll-toggle-btn" onclick="hideScrollBar()" title="Hide">✕</button>
</div>
<button class="scroll-bar-open-btn hidden" id="scrollOpenBtn" onclick="showScrollBar()">
  <span class="ob-icon">▶</span>Auto-scroll
</button>

</body>
</html>
