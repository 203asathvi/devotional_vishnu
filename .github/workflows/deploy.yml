name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main          # auto-deploy to production on push to main
  pull_request:
    branches:
      - main          # preview deployment for pull requests

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: devotional-vishnu    # ← must match your Pages project name in Cloudflare
          directory: .                      # serve from repo root
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}   # enables PR preview URLs
